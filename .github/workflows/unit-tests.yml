name: Automated Unit Testing & Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  unit-tests-and-coverage:
    name: Run Vitest Suite & Generate Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Execute Vitest with Coverage
        run: |
          npm run test:coverage

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: SmartStudy-Code-Coverage-Report
          path: |
            coverage/
          retention-days: 30

      - name: Publish Test & Coverage Summary
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const summary = `
            ## 📊 Unit Testing & Code Coverage Summary
            - **Framework**: Vitest + React Testing Library + v8 Coverage
            - **Status**: PASSED ✅
            - **Reports Generated**: HTML, LCOV, JSON
            - **Coverage Artifact**: SmartStudy-Code-Coverage-Report
            `;
            core.summary.addRaw(summary).write();
