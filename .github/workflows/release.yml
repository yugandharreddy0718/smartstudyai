name: Automated Release Packaging

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    name: Package Release & Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v7
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install & Build Production Assets
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Package Dist Assets into Zip
        run: |
          zip -r smartstudy-ai-release-${{ github.ref_name }}.zip dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: smartstudy-ai-release-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
